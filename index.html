<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>电子木鱼</title>
    <link rel="stylesheet" href="./asset/css/default.css" />
    <link rel="shortcut icon" href="./asset/img/icon.jpg" />
    <!-- 引入样式 -->
    <link rel="stylesheet" href="./asset/css/element.css" />
    <style>
      /* 平板以及手机的尺寸大小 */
      @media screen and (max-width: 530px) {
        body {
          background-color: black;
          color: #fff;
        }
        .qiaoji {
          margin-top: 10%;
          width: 100%;
          height: 30vh;
          text-align: center;
        }
        .muyu {
          width: 211px;
          height: 211px;
          margin: 0 auto;
        }
        .sf {
          animation: suofang 0.3s;
        }
        .gongde {
          position: absolute;
          left: 70%;
          top: 24%;
          transform: translateX(-50%);
          width: 100px;
          height: 30px;
          font-size: 21px;
        }
        .gongdejiayi {
          animation: textMove 0.6s;
        }
        .gongdeLuBox {
          position: absolute;
          width: 90%;
          height: 600px;
          top: 15%;
          left: 50%;
          transform: translateX(-50%);
          border: 1px solid white;
          background-color:  #000000;
          z-index: 3;
          animation: showBox 0.5s;
          overflow-y: scroll;
        }
        .gongdeLuBox h1 {
          text-align: center;
        }
        .userName {
          width: 95%;
          height: 50px;
          line-height: 50px;
          padding-left: 8px;
          padding-right: 8px;
          background-color: #606266;
          border-radius: 5px;
          font-size: 18px;
          margin: 1% auto 0;
          display: flex;
          justify-content: space-between;
          color: white;
        }
        .userName:nth-child(4) {
          font-size: 25px;
          font-weight: bold;
          color: #000000;
          background-color: #ff9a0a;
        }
        .userName:nth-child(5) {
          font-size: 23px;
          font-weight: 600;
          color: #000000;
          background-color: silver;
        }
        .userName:nth-child(6) {
          font-size: 21px;
          font-weight: 500;
          color: #000000;
          background-color:#eebe77;
        }
        .btns {
          display: flex;
          justify-content: space-between;
          width: 70%;
          margin: 40% auto 5%;
        }
        .close {
          position: absolute;
          right: 3%;
          top: 1%;
          width: 32px;
          height: 32px;
          background: url("asset/img/关闭.png") no-repeat;
        }
        .userNameBox {
          width: 70%;
          margin: 20% auto 0;
        }
        .shangchuanGD {
          width: 70%;
          margin: 20% auto 0;
          text-align: center;
        }
        /* 反馈 */
        .feedBack {
          width: 90%;
          margin: 20% auto 0;
        }
        .feedBack div {
          text-align: center;
        }
        .version {
          position: absolute;
          right: 8%;
        }
      }
      /* 电脑尺寸大小 */
      @media screen and (min-width: 531px) {
        body {
          background-color: black;
          color: #fff;
        }
        .qiaoji {
          margin-top: 5%;
          width: 100%;
          height: 25vh;
          text-align: center;
        }
        .muyu {
          width: 211px;
          height: 211px;
          margin: 0 auto;
        }
        .sf {
          animation: suofang 0.3s;
        }
        .gongde {
          position: absolute;
          left: 60%;
          top: 24%;
          transform: translateX(-50%);
          width: 100px;
          height: 30px;
          font-size: 21px;
        }
        .gongdejiayi {
          animation: textMove 0.6s;
        }
        .gongdeLuBox {
          position: absolute;
          width: 50%;
          height: 625px;
          top: 15%;
          left: 50%;
          transform: translateX(-50%);
          border: 1px solid white;
          background-color: black;
          z-index: 3;
          animation: showBox 0.5s;
        }
        .gongdeLuBox h1 {
          text-align: center;
        }
        .userName {
          width: 70%;
          height: 45px;
          line-height: 45px;
          padding-left: 8px;
          padding-right: 8px;
          background-color: #606266;
          border-radius: 5px;
          font-size: 18px;
          margin: 1% auto 0;
          display: flex;
          justify-content: space-between;
          color: white;
        }
        .userName:nth-child(4) {
          font-size: 25px;
          font-weight: bold;
          color: #000000;
          background-color: #ff9a0a;
        }
        .userName:nth-child(5) {
          font-size: 23px;
          font-weight: 600;
          color: #000000;
          background-color: silver;
        }
        .userName:nth-child(6) {
          font-size: 21px;
          font-weight: 500;
          color: #000000;
          background-color:#eebe77;
        }
        .btns {
          display: flex;
          justify-content: space-between;
          width: 30%;
          margin: 10% auto 5%;
        }
        .close {
          position: absolute;
          right: 3%;
          top: 1%;
          width: 32px;
          height: 32px;
          background: url("asset/img/关闭.png") no-repeat;
        }
        .userNameBox {
          width: 70%;
          margin: 20% auto 0;
        }
        .shangchuanGD {
          width: 70%;
          margin: 20% auto 0;
          text-align: center;
        }
        /* 反馈 */
        .feedBack {
          width: 90%;
          margin: 20% auto 0;
        }
        .feedBack div {
          text-align: center;
        }
        .version {
          position: absolute;
          right: 8%;
        }
      }
      /* 木鱼 */
      @keyframes suofang {
        50% {
          transform: scale(0.8, 0.8);
        }
        100% {
          transform: scale(1, 1);
        }
      }
      /* 字体向上消失 */
      @keyframes textMove {
        from {
          top: 24%;
          opacity: 1;
        }
        to {
          top: 22%;
          opacity: 0;
        }
      }
      /* 弹窗出现动画 */
      @keyframes showBox {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      [v-cloak] {
        display: none;
      }
      .el-message-box {
        --el-messagebox-width: 320px;
      }
    </style>
  </head>
  <body>
    <div id="app" v-cloak>
      <!-- 敲击次数 -->
      <div class="qiaoji" v-show="main">
        <h2>今日敲击次数</h2>
        <br />
        <h2>{{count}}</h2>
      </div>
      <!-- 功德 -->
      <div class="gongde" :class="{gongdejiayi}">{{gongde}}</div>
      <!-- 木鱼 -->
      <div class="muyu" :class="{sf}" @click="chuang" v-show="main">
        <img src="./asset/img/muyu.jpg" />
      </div>
      <audio ref="ding" src="./asset/audio/muyu.mp3"></audio>
      <!-- 提交与展示功德录 -->
      <div class="btns" v-show="main">
        <el-button type="warning" @click="openGD">功德录</el-button>
        <el-button type="success" @click="commitGD">上传功德</el-button>
        <el-button type="warning" @click="TodayGD">今日功德</el-button>
      </div>
      <!-- 功德录 -->
      <div class="gongdeLuBox" v-show="gongdeLuBox">
        <div class="close" @click="closeGD"></div>
        <h1>{{ListOfQualities}}</h1>
        <br />
        <div class="userName" v-for="(item,index) in Data" :key="index">
          <div>{{index+1}}.&nbsp;&nbsp;{{item.userName}}</div>
          <div>{{item.count}}</div>
        </div>
      </div>
      <!-- 上传功德 -->
      <div class="gongdeLuBox" v-show="shuangchuanBox">
        <div class="close" @click="closeGDL"></div>
        <div
          style="
            text-align: center;
            width: 90%;
            margin: 30% auto 0;
            font-size: 30px;
          "
        >
          一天只能上传一次哦
        </div>
        <div class="userNameBox">
          <el-input
            type="text"
            placeholder="请输入名字"
            v-model.trim="text"
            maxlength="8"
            show-word-limit
          >
          </el-input>
        </div>
        <div class="shangchuanGD">
          <el-button
            type="success"
            :plain="true"
            :disabled="isCommit"
            @click="GDbtn"
            >上传功德</el-button
          >
        </div>
        <!-- 反馈 -->
        <div class="feedBack">
          <h3>BUG反馈：</h3>
          <br />
          <div>前端 : 1210946999@qq.com</div>
          <div>后端 : 1063720909@qq.com</div>
          <div style="color: pink">美术制作 :多多</div>
        </div>
      </div>
      <!-- 版本号 -->
      <div class="version">version:1.1.0</div>
    </div>
    <!-- 导入 Vue -->
    <script src="./asset/js/Vue.js"></script>
    <script src="./asset/js/axios.js"></script>
    <!-- 禁止IOS用户双击缩放 -->
    <script src="./asset/js/BanZoom.js"></script>
    <!-- 引入组件库 -->
    <script src="./asset/js/elementUI.js"></script>
    <script src="asset/js/jjb.js"></script>
    <script type="module">
      let isclick = true;
      let d = new Date().getDay();
      const App = {
        data() {
          return {
            main: true,
            count: 0,
            sf: false,
            gongdejiayi: false,
            gongde: "",
            Data: [],
            gongdeLuBox: false,
            shuangchuanBox: false,
            isCommit: "",
            text: "",
            sendMsg: 0,
            ListOfQualities: "",
          };
        },
        created() {

          this.getData();
          this.GetFristTime();
          this.Time();
          this.dangDang();
          this.crazyTemple();
        },
        methods: {
          // 总功德录数据
          async getData() {
            const { data } = await axios.get("rankingList");
            this.Data = data.data;
          },
          // 今日功德数据
          async getTodayData() {
            const { data } = await axios.get("rankingListDate");
            this.Data = data.data;
          },
          // 敲击次数
          dangDang() {
            let count = localStorage.getItem("count");
            let sendMsg = localStorage.getItem("sendMsg");
            if (count == null) {
              localStorage.setItem("count", qqq("0"));
            }
            count = localStorage.getItem("count");
            let counts = jjj(count);
              if (Object.is(Number(counts),NaN)) {
                this.$message.error("佛祖面前都作弊，真不怕遭报应啊。");
                this.main = false;
                location.href = "http://www.wchscu.cn/department_sjwk.html"
              }
            if (sendMsg === null) {
              this.sendMsg = 0;
            }else{
              this.sendMsg = localStorage.getItem("sendMsg");
            }
            this.count = Number(counts);
            if (counts == null) {
              this.count = 0;
            }
          },
          chuang() {
            if (this.count < 10000) {
              if (isclick) {
                this.gongdejiayi = true;
                isclick = false;
                let ding = this.$refs.ding;
                ding.play();
                // 疯狂星期寺
                if (d == 4) {
                  this.gongde = "功德+2";
                } else {
                  this.gongde = "功德+1";
                }

                ding.addEventListener("ended", () => {
                  isclick = true;
                  this.sf = false;
                  this.gongde = "";
                  this.gongdejiayi = false;
                });
                this.sf = true;
                // 疯狂星期寺
                if (d == 4) {
                  this.count += 2;
                } else {
                  this.count += 1;
                }
                let str = this.count.toString();
                localStorage.setItem("count", qqq(str));
              }
            }
          },
          openGD() {
            this.gongdeLuBox = !this.gongdeLuBox;
            this.ListOfQualities = "功德录";
            this.getData();
          },
          TodayGD() {
            this.gongdeLuBox = !this.gongdeLuBox;
            this.ListOfQualities = "今日功德榜";
            this.getTodayData();
          },
          closeGD() {
            this.gongdeLuBox = !this.gongdeLuBox;
          },
          // 上传功德盒子
          commitGD() {
            this.shuangchuanBox = !this.shuangchuanBox;
            this.text = "";
            if (this.text == "" || this.count == 0) {
              this.isCommit = true;
            }
          },
          closeGDL() {
            this.shuangchuanBox = !this.shuangchuanBox;
          },
          // 上传功德
          GDbtn() {
            console.log(this.sendMsg);
            if (this.sendMsg == 0) {
              // 用户储存当前时间
              localStorage.setItem("sendMsg", 1);
              this.sendMsg = 1;
              this.isCommit = true;
              const params = new URLSearchParams();
              params.append("userName",this.text);
              params.append("count",countEncrypt(qqq(this.count+"")));
              axios.post("submit",params).then(res=>{
                this.$message({
                  message: "恭喜你，功德上传成功",
                  type: "success",
                });
                this.text = "";
              }).catch(err=>{
                console.log(err)
              })
            } else {
              this.$message.error("一天只能上传一次哦");
              this.text = "";
            }
          },
          Time() {
            // 当前时间
            const date = new Date().getTime();
            // 0点的时间
            let CLEARTIME = localStorage.getItem("CLEARTIME");
            let count = localStorage.getItem("count");
            if (date > CLEARTIME) {
              localStorage.setItem("count", qqq("0"));
              localStorage.setItem("sendMsg", 0);
              localStorage.setItem("nextDay", false);
            }
          },
          // 以下是获取当天23点的时间。
          GetFristTime() {
            // 是否到了第二天
            let nextDay = localStorage.getItem("nextDay");
            if (nextDay == null) {
              localStorage.setItem("nextDay", false);
            }
            nextDay = localStorage.getItem("nextDay");
            // 当日23点59分59秒的时间戳
            if (nextDay == "false") {
              this.getClearTime();
            }
          },
          getClearTime() {
            const CLEARTIME = new Date(
              new Date().setHours(0, 0, 0, 0) + 24 * 60 * 60 * 1000 - 1
            ).getTime();
            localStorage.setItem("CLEARTIME", CLEARTIME);
            localStorage.setItem("nextDay", true);
          },
          crazyTemple() {
            if (d == 4 && this.main == true) {
              this.$alert(
                "今天是疯狂星期寺活动！功德翻倍！！！",
                "疯狂星期寺",
                {
                  confirmButtonText: "确定",
                }
              );
            }
          },
        },
        watch: {
          text(newName, oldName) {
            if (newName !== "") {
              this.isCommit = false;
            } else {
              this.isCommit = true;
            }
          },
        },
      };
      const app = Vue.createApp(App);
      app.use(ElementPlus);
      app.mount("#app");
    </script>
  </body>
</html>
